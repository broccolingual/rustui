name: Cargo Release

on:
  workflow_dispatch:
  pull_request:
    types: 
      - closed

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo release --execute --no-confirm
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
